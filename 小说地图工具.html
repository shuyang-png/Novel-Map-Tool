            for (let i = 0; i < points.length - 1; i++) {
                const mx = (points[i].x + points[i+1].x) / 2;
                const my = (points[i].y + points[i+1].y) / 2;
                const dx = points[i+1].x - points[i].x;
                const dy = points[i+1].y - points[i].y;
                const segLen = Math.sqrt(dx*dx + dy*dy);
                const archH = Math.min(segLen * 0.3, 20);
                // 法线方向（向上凸）
                const nx = -dy / segLen;
                const ny = dx / segLen;
                ctx.beginPath();
                ctx.moveTo(points[i].x, points[i].y);
                ctx.quadraticCurveTo(mx + nx * archH, my + ny * archH,
                                     points[i+1].x, points[i+1].y);
                ctx.stroke();
            }
            ctx.restore();
        }

        /**
         * 绘制王国皇冠符号（沿多边形边线等距标注 ♛）
         * 三角+底座+两侧小三角
         */
        function drawKingdomInPolygon(ctx, points, color) {
            if (!points || points.length < 3) return;
            ctx.save();
            ctx.fillStyle = color;
            const crownSize = 10;
            const spacing = 80;
            // 沿每条边等距画皇冠
            for (let i = 0; i < points.length; i++) {
                const j = (i + 1) % points.length;
                const dx = points[j].x - points[i].x;
                const dy = points[j].y - points[i].y;
                const segLen = Math.sqrt(dx*dx + dy*dy);
                if (segLen < 1) continue;
                const angle = Math.atan2(dy, dx);
                const nx = -Math.sin(angle);
                const ny = Math.cos(angle);
                let dist = spacing / 2;
                while (dist < segLen) {
                    const px = points[i].x + dx * dist / segLen;
                    const py = points[i].y + dy * dist / segLen;
                    // 朝外侧画皇冠
                    drawCrownSymbol(ctx, px + nx * 5, py + ny * 5, crownSize, angle, nx, ny, color);
                    dist += spacing;
                }
            }
            ctx.restore();
        }

        /**
         * 绘制皇冠符号（矩形边线专用）
         */
        function drawKingdomInRect(ctx, x, y, w, h, color) {
            ctx.save();
            ctx.fillStyle = color;
            const crownSize = 10;
            const spacing = 80;
            // 上边
            for (let tx = x + spacing/2; tx < x + w; tx += spacing) {
                drawCrownSymbol(ctx, tx, y - 3, crownSize, 0, 0, -1, color);
            }
            // 下边
            for (let tx = x + spacing/2; tx < x + w; tx += spacing) {
                drawCrownSymbol(ctx, tx, y + h + 3, crownSize, 0, 0, 1, color);
            }
            // 左边
            for (let ty = y + spacing/2; ty < y + h; ty += spacing) {
                drawCrownSymbol(ctx, x - 3, ty, crownSize, -Math.PI/2, -1, 0, color);
            }
            // 右边
            for (let ty = y + spacing/2; ty < y + h; ty += spacing) {
                drawCrownSymbol(ctx, x + w + 3, ty, crownSize, Math.PI/2, 1, 0, color);
            }
            ctx.restore();
        }

        /**
         * 绘制皇冠符号（椭圆边线专用）
         */
        function drawKingdomInEllipse(ctx, cx, cy, rx, ry, color) {
            ctx.save();
            ctx.fillStyle = color;
            const crownSize = 10;
            const perimeter = Math.PI * (3 * (rx + ry) - Math.sqrt((3 * rx + ry) * (rx + 3 * ry)));
            const count = Math.max(4, Math.floor(perimeter / 80));
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 * i) / count;
                const px = cx + rx * Math.cos(angle);
                const py = cy + ry * Math.sin(angle);
                const nx = Math.cos(angle);
                const ny = Math.sin(angle);
                drawCrownSymbol(ctx, px, py, crownSize, angle, nx, ny, color);
            }
            ctx.restore();
        }

        /**
         * 绘制单个皇冠图形
         */
        function drawCrownSymbol(ctx, x, y, size, angle, nx, ny, color) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.fillStyle = color;
            ctx.beginPath();
            // 底座矩形
            ctx.moveTo(-size * 0.6, size * 0.3);
            ctx.lineTo(-size * 0.6, 0);
            // 左三角
            ctx.lineTo(-size * 0.3, -size * 0.2);
            // 中间大三角
            ctx.lineTo(0, -size * 0.6);
            // 右三角
            ctx.lineTo(size * 0.3, -size * 0.2);
            // 右上
            ctx.lineTo(size * 0.6, 0);
            ctx.lineTo(size * 0.6, size * 0.3);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        // ==================== Pin 类型绘制函数 ====================

        /**
         * 绘制水滴形（泉眼/瀑布 pin）
         * 弧线+下方尖角组成水滴轮廓
         */
        function drawSpringPin(ctx, x, y, size, color) {
            ctx.save();
            ctx.fillStyle = color;
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            // 水滴：上半圆弧 + 下方尖角
            ctx.arc(x, y - size * 0.3, size * 0.5, Math.PI, 0, false);
            ctx.quadraticCurveTo(x + size * 0.5, y + size * 0.2, x, y + size * 0.7);
            ctx.quadraticCurveTo(x - size * 0.5, y + size * 0.2, x - size * 0.5, y - size * 0.3);
            ctx.closePath();
            ctx.fill();
            // 内部高光小圆
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.arc(x - size * 0.15, y - size * 0.35, size * 0.12, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        /**
         * 绘制火山形（△三角 + 底部半圆弧）
         */
        function drawVolcanoPin(ctx, x, y, size, color) {
            ctx.save();
            ctx.fillStyle = color;
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5;
            // 三角形
            ctx.beginPath();
            ctx.moveTo(x, y - size);
            ctx.lineTo(x - size * 0.8, y + size * 0.3);
            ctx.lineTo(x + size * 0.8, y + size * 0.3);
            ctx.closePath();
            ctx.fill();
            // 底部半圆弧（火山口效果）
            ctx.beginPath();
            ctx.arc(x, y + size * 0.3, size * 0.4, 0, Math.PI, false);
            ctx.stroke();
            // 顶部烟雾小点
            ctx.fillStyle = '#999';
            ctx.beginPath();
            ctx.arc(x, y - size * 1.2, size * 0.15, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        /**
         * 绘制雪山形（△白色填充 + 蓝色描边 + 顶部短线）
         */
        function drawSnowPeakPin(ctx, x, y, size) {
            ctx.save();
            // 白色填充三角
            ctx.fillStyle = '#fff';
            ctx.strokeStyle = '#3498db';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x, y - size);
            ctx.lineTo(x - size * 0.8, y + size * 0.5);
            ctx.lineTo(x + size * 0.8, y + size * 0.5);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            // 顶部雪线
            ctx.strokeStyle = '#3498db';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x - size * 0.3, y - size * 0.6);
            ctx.lineTo(x + size * 0.3, y - size * 0.6);
            ctx.stroke();
            // 底部阴影
            ctx.strokeStyle = 'rgba(52,152,219,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(x - size * 0.5, y + size * 0.2);
            ctx.lineTo(x + size * 0.5, y + size * 0.2);
            ctx.stroke();
            ctx.restore();
        }

        /**
         * 绘制洞穴拱门形（半圆弧 + 底部横线 ⊔）
         */
        function drawCavePin(ctx, x, y, size, color) {
            ctx.save();
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            // 半圆弧
            ctx.beginPath();
            ctx.arc(x, y, size * 0.6, Math.PI, 0, false);
            ctx.fill();
            ctx.stroke();
            // 底部横线
            ctx.beginPath();
            ctx.moveTo(x - size * 0.6, y);
            ctx.lineTo(x + size * 0.6, y);
            ctx.stroke();
            // 两侧竖线
            ctx.beginPath();
            ctx.moveTo(x - size * 0.6, y);
            ctx.lineTo(x - size * 0.6, y + size * 0.5);
            ctx.moveTo(x + size * 0.6, y);
            ctx.lineTo(x + size * 0.6, y + size * 0.5);
            ctx.stroke();
            ctx.restore();
        }

        /**
         * 绘制人字屋顶小屋（村庄 pin）
         * ▽ + 下方矩形
         */
        function drawVillagePin(ctx, x, y, size, color) {
            ctx.save();
            ctx.fillStyle = color;
            // 屋顶三角
            ctx.beginPath();
            ctx.moveTo(x, y - size * 0.7);
            ctx.lineTo(x - size * 0.7, y);
            ctx.lineTo(x + size * 0.7, y);
            ctx.closePath();
            ctx.fill();
            // 墙体矩形
            ctx.fillRect(x - size * 0.45, y, size * 0.9, size * 0.5);
            // 门
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(x - size * 0.1, y + size * 0.15, size * 0.2, size * 0.35);
            ctx.restore();
        }

        /**
         * 绘制宝塔形（庙宇 pin）
         * 多层三角+横线堆叠
         */
        function drawTemplePin(ctx, x, y, size, color) {
            ctx.save();
            ctx.fillStyle = color;
            ctx.strokeStyle = color;
            ctx.lineWidth = 1;
            const layers = 3;
            for (let i = 0; i < layers; i++) {
                const layerY = y - size * 0.8 + i * size * 0.5;
                const layerW = size * (0.3 + i * 0.25);
                const layerH = size * 0.35;
                // 每层小三角屋顶
                ctx.beginPath();
                ctx.moveTo(x, layerY - layerH);
                ctx.lineTo(x - layerW, layerY);
                ctx.lineTo(x + layerW, layerY);
                ctx.closePath();
                ctx.fill();
                // 屋檐横线
                ctx.beginPath();
                ctx.moveTo(x - layerW * 1.2, layerY);
                ctx.lineTo(x + layerW * 1.2, layerY);
                ctx.stroke();
            }
            // 底座
            ctx.fillRect(x - size * 0.3, y + size * 0.2, size * 0.6, size * 0.3);
            ctx.restore();
        }

        /**
         * 绘制断柱形（废墟 pin）
         * 高低不齐的矩形柱子
         */
        function drawRuinPin(ctx, x, y, size, color) {
            ctx.save();
            ctx.fillStyle = color;
            ctx.strokeStyle = color;
            ctx.lineWidth = 1;
            // 左柱（高）
            ctx.fillRect(x - size * 0.4, y - size * 0.6, size * 0.25, size * 1.1);
            // 中柱（矮，断）
            ctx.fillRect(x - size * 0.05, y - size * 0.2, size * 0.25, size * 0.7);
            // 右柱（中等）
            ctx.fillRect(x + size * 0.3, y - size * 0.4, size * 0.25, size * 0.9);
            // 断裂线
            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(x - size * 0.05, y - size * 0.2);
            ctx.lineTo(x + size * 0.2, y - size * 0.35);
            ctx.stroke();
            ctx.restore();
        }

        /**
         * 选择标识类型后自动填充样式，不切换参数区
         */
        function applyPreset() {
            const presetKey = document.getElementById('geoPresetType').value;
            if (!presetKey || !GEO_PRESETS[presetKey]) return;
            const preset = GEO_PRESETS[presetKey];

            // 填充样式
            document.getElementById('geoStrokeColor').value = preset.strokeColor;
            document.getElementById('geoStrokeColorText').value = preset.strokeColor;
            document.getElementById('geoLineWidth').value = preset.lineWidth;
            document.getElementById('geoBold').checked = preset.bold;

            if (preset.fillColor) {
                const hex = rgbaToHex(preset.fillColor);
                document.getElementById('geoFillColor').value = hex;
                document.getElementById('geoFillColorText').value = preset.fillColor;
            }

            // 形状约束：
            //   lineOnly: true  → 只能折线（线状特征）
            //   lineOnly: false → 不能折线（面状/点状），其余均可
            //   无 lineOnly 字段 → 通用，全部可选
            //   标注点对所有类型开放
            const shapeEl = document.getElementById('geoShape');
            const shapeLabel = document.getElementById('geoShapeLabel');
            const hasConstraint = ('lineOnly' in preset);
            for (const opt of shapeEl.options) {
                if (!hasConstraint) {
                    opt.disabled = false;
                } else if (preset.lineOnly) {
                    opt.disabled = (opt.value !== 'polyline');
                } else {
                    opt.disabled = (opt.value === 'polyline');
                }
            }
            // 如果当前选中的被禁用了，切到第一个可用的
            if (shapeEl.selectedOptions[0] && shapeEl.selectedOptions[0].disabled) {
                for (const opt of shapeEl.options) {
                    if (!opt.disabled) { shapeEl.value = opt.value; break; }
                }
            }
            shapeEl.disabled = false;
            shapeEl.title = '';
            shapeLabel.textContent = '范围形状';
            showGeoParamSection(shapeEl.value);
        }

        /**
         * 显示对应的参数区域
         */
        function showGeoParamSection(shape) {
            document.getElementById('geoParamPoints').style.display =
                (shape === 'polyline' || shape === 'polygon') ? 'block' : 'none';
            document.getElementById('geoParamRect').style.display =
                (shape === 'rect') ? 'block' : 'none';
            document.getElementById('geoParamEllipse').style.display =
                (shape === 'ellipse') ? 'block' : 'none';
            document.getElementById('geoParamPin').style.display =
                (shape === 'pin') ? 'block' : 'none';
            document.getElementById('geoFillGroup').style.display =
                (shape === 'polygon' || shape === 'ellipse' || shape === 'rect') ? 'block' : 'none';
        }

        /**
         * 切换地理标识参数表单（根据形状选择器）
         */
        function toggleGeoParams() {
            const shape = document.getElementById('geoShape').value;
            showGeoParamSection(shape);
        }

        /**
         * 添加地理标识
         */
        function addGeoMarker() {
            const name = geoName.value.trim();
            const shape = document.getElementById('geoShape').value;
            const presetType = document.getElementById('geoPresetType').value || '通用';
            const preset = GEO_PRESETS[presetType] || GEO_PRESETS['通用'];
            const strokeColor = geoStrokeColor.value || preset.strokeColor;
            const fillColor = geoFillColorText.value || preset.fillColor || '#27ae60';
            const lineWidth = parseInt(geoLineWidth.value) || preset.lineWidth;
            const bold = geoBold.checked;

            if (!name) {
                alert('标识名称不能为空！');
                return;
            }

            let geo = {
                id: `geo_${Date.now()}`,
                presetType: presetType,
                type: shape,
                name,
                style: {
                    strokeColor,
                    lineWidth,
                    lineDash: null,
                    fillColor: null,
                    bold,
                    symbol: preset.symbol
                }
            };

            if (shape === 'polyline' || shape === 'polygon') {
                const pointsText = geoPoints.value.trim();
                const lines = pointsText.split('\n').map(l => l.trim()).filter(l => l);
                const minPts = (shape === 'polygon') ? 3 : 2;
                if (lines.length < minPts) {
                    alert(shape === 'polygon' ? '多边形至少需要3个顶点！' : '至少需要2个顶点！');
                    return;
                }
                const points = [];
                for (const line of lines) {
                    const parts = line.split(',').map(s => parseInt(s.trim()));
                    if (parts.length !== 2 || isNaN(parts[0]) || isNaN(parts[1])) {
                        alert(`坐标格式错误："${line}"，应为 "x,y"`);
                        return;
                    }
                    if (parts[0] < 0 || parts[0] > 2000 || parts[1] < 0 || parts[1] > 2000) {
                        alert(`坐标超出范围：(${parts[0]},${parts[1]})，范围 0~2000`);
                        return;
                    }
                    points.push({ x: parts[0], y: parts[1] });
                }
                geo.points = points;
                if (shape === 'polyline') {
                    geo.arrowEnd = false;
                }
                if (shape === 'polygon' && preset.fillColor) {
                    geo.style.fillColor = preset.fillColor;
                }
            } else if (shape === 'rect') {
                geo.x = parseInt(document.getElementById('geoRectX').value) || 0;
                geo.y = parseInt(document.getElementById('geoRectY').value) || 0;
                geo.width = parseInt(document.getElementById('geoRectW').value) || 100;
                geo.height = parseInt(document.getElementById('geoRectH').value) || 100;
                if (preset.fillColor) geo.style.fillColor = preset.fillColor;
            } else if (shape === 'ellipse') {
                geo.cx = parseInt(document.getElementById('geoEllipseCx').value) || 0;
                geo.cy = parseInt(document.getElementById('geoEllipseCy').value) || 0;
                geo.rx = parseInt(document.getElementById('geoEllipseRx').value) || 100;
                geo.ry = parseInt(document.getElementById('geoEllipseRy').value) || 100;
                if (preset.fillColor) geo.style.fillColor = preset.fillColor;
            } else if (shape === 'pin') {
                geo.x = parseInt(document.getElementById('geoPinX').value) || 0;
                geo.y = parseInt(document.getElementById('geoPinY').value) || 0;
            }

            state.geoMarkers.push(geo);

            // 清空表单
            geoName.value = '';

            updateGeoList();
            renderMap();
        }

        /**
         * 编辑地理标识（加载到表单）
         */
        function editGeoMarker(geoId) {
            const geo = state.geoMarkers.find(g => g.id === geoId);
            if (!geo) return;

            geoName.value = geo.name || '';

            // 还原形状选择
            document.getElementById('geoShape').value = geo.type || 'polyline';

            // 还原标识类型选择
            if (geo.presetType && GEO_PRESETS[geo.presetType]) {
                document.getElementById('geoPresetType').value = geo.presetType;
            } else {
                document.getElementById('geoPresetType').value = '通用';
            }

            // 切换参数区
            showGeoParamSection(geo.type);

            // 填充参数
            if (geo.points) {
                geoPoints.value = geo.points.map(p => `${p.x},${p.y}`).join('\n');
            }
            if (geo.type === 'rect') {
                document.getElementById('geoRectX').value = geo.x || 0;
                document.getElementById('geoRectY').value = geo.y || 0;
                document.getElementById('geoRectW').value = geo.width || 100;
                document.getElementById('geoRectH').value = geo.height || 100;
            }
            if (geo.type === 'ellipse') {
                document.getElementById('geoEllipseCx').value = geo.cx || 0;
                document.getElementById('geoEllipseCy').value = geo.cy || 0;
                document.getElementById('geoEllipseRx').value = geo.rx || 100;
                document.getElementById('geoEllipseRy').value = geo.ry || 100;
            }
            if (geo.type === 'pin') {
                document.getElementById('geoPinX').value = geo.x || 0;
                document.getElementById('geoPinY').value = geo.y || 0;
            }

            // 填充样式
            const style = geo.style || {};
            if (style.strokeColor) {
                geoStrokeColor.value = style.strokeColor;
                geoStrokeColorText.value = style.strokeColor;
            }
            if (style.fillColor) {
                const hex = rgbaToHex(style.fillColor);
                geoFillColor.value = hex;
                geoFillColorText.value = style.fillColor;
            }
            geoLineWidth.value = style.lineWidth || 2;
            geoBold.checked = style.bold || false;

            // 删除原标识
            state.geoMarkers = state.geoMarkers.filter(g => g.id !== geoId);
            updateGeoList();
            renderMap();

            // 应用预设（含形状锁定）
            applyPreset();
        }

        /**
         * 删除地理标识
         */
        function deleteGeoMarker(geoId) {
            state.geoMarkers = state.geoMarkers.filter(g => g.id !== geoId);
            updateGeoList();
            renderMap();
        }

        /**
         * 更新地理标识列表
         */
        function updateGeoList() {
            if (state.geoMarkers.length === 0) {
                geoListEl.innerHTML = '暂无地理标识';
                return;
            }
            geoListEl.innerHTML = '';
            state.geoMarkers.forEach(geo => {
                const item = document.createElement('div');
                item.className = 'list-item';
                const typeLabel = { polyline: '折线', polygon: '多边形', circle: '圆形', rect: '矩形', ellipse: '椭圆', pin: '标注点' }[geo.type] || geo.type;
                const presetLabel = geo.presetType || '通用';
                let ptsInfo = '';
                if (geo.points) {
                    ptsInfo = `${geo.points.length}个顶点`;
                } else if (geo.type === 'rect') {
                    ptsInfo = `(${geo.x},${geo.y}) ${geo.width}×${geo.height}`;
                } else if (geo.type === 'ellipse') {
                    ptsInfo = `(${geo.cx},${geo.cy}) rx=${geo.rx} ry=${geo.ry}`;
                } else if (geo.center) {
                    ptsInfo = `圆心(${geo.center.x},${geo.center.y}) r=${geo.radius}`;
                }
                item.innerHTML = `
                    <div style="flex:1;">
                        <div style="font-weight:600;">${geo.name}（${typeLabel}·${presetLabel}）</div>
                        <div style="font-size:12px; color:#666;">${ptsInfo}</div>
                    </div>
                    <div>
                        <button class="list-btn" onclick="editGeoMarker('${geo.id}')">编辑</button>
                        <button class="list-btn btn-danger" onclick="deleteGeoMarker('${geo.id}')">删除</button>
                    </div>
                `;
                geoListEl.appendChild(item);
            });
        }

        /**
         * hex 转 rgba
         */
        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${alpha})`;
        }

        /**
         * rgba 转 hex（取 RGB 部分）
         */
        function rgbaToHex(rgba) {
            const match = rgba.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
            if (!match) return '#27ae60';
            return '#' + [match[1], match[2], match[3]].map(c => parseInt(c).toString(16).padStart(2, '0')).join('');
        }

        /**
         * 2. 缩放处理（鼠标滚轮）
         */
        function handleWheel(e) {
            e.preventDefault();
            // 计算新缩放比例（每次调整0.1）
            const delta = e.deltaY < 0 ? 0.1 : -0.1;
            let newScale = state.scale + delta;
            // 限制缩放范围（0.1~2）
            newScale = Math.max(0.1, Math.min(2, newScale));
            // 更新缩放比例并重新渲染
            state.scale = newScale;
            renderMap();
        }

        /**
         * 3. 拖拽处理（鼠标）- 允许滑动到任意地方
         */
        function handleMouseDown(e) {
            state.isDragging = true;
            state.dragMoved = false; // 重置拖拽移动标记
            // 记录初始鼠标位置和当前偏移量
            state.dragStartX = e.clientX;
            state.dragStartY = e.clientY;
            state.lastOffsetX = state.offsetX;
            state.lastOffsetY = state.offsetY;
        }

        function handleMouseMove(e) {
            if (!state.isDragging) return;
            
            // 标记发生了拖拽移动
            state.dragMoved = true;
            
            // 计算偏移差值
            const deltaX = e.clientX - state.dragStartX;
            const deltaY = e.clientY - state.dragStartY;
            // 更新偏移量（基于当前缩放比例调整拖拽速度）
            let newOffsetX = state.lastOffsetX + deltaX / state.scale;
            let newOffsetY = state.lastOffsetY + deltaY / state.scale;
            
            // 移除严格的边界限制，允许滑动到任意地方
            // 只保留基本的合理性限制
            const maxOffset = canvas.width * 3;
            const minOffset = -canvas.width * 3;
            
            newOffsetX = Math.max(minOffset, Math.min(maxOffset, newOffsetX));
            newOffsetY = Math.max(minOffset, Math.min(maxOffset, newOffsetY));
            
            // 更新偏移量并重新渲染
            state.offsetX = newOffsetX;
            state.offsetY = newOffsetY;
            renderMap();
        }

        function handleMouseUp() {
            state.isDragging = false;
        }

        /**
         * 4. 地图点击（添加坐标点）- 只有非拖拽才触发
         */
        function handleCanvasClick(e) {
            // 如果发生了拖拽移动，则不触发添加坐标点
            if (state.dragMoved) return;
            
            // 计算点击位置在地图上的原始坐标（反向应用缩放和偏移）
            const rect = canvas.getBoundingClientRect();
            const clickX = (e.clientX - rect.left - canvas.width / 2) / state.scale + canvas.width / 2 - state.offsetX;
            const clickY = (e.clientY - rect.top - canvas.height / 2) / state.scale + canvas.height / 2 - state.offsetY;
            
            // 限制坐标在0~2000范围内
            const x = Math.max(0, Math.min(state.mapSize, Math.round(clickX)));
            const y = Math.max(0, Math.min(state.mapSize, Math.round(clickY)));

            // 输入坐标点名称
            const name = prompt('请输入坐标点名称：', '');
            if (!name || !name.trim()) return;
            
            // 输入坐标点备注
            const content = prompt('请输入备注说明（≤200字）：', '');
            if (content !== null) {
                if (content.length > 200) {
                    alert('备注字数不能超过200字！');
                    return;
                }
                
                // 添加新坐标点
                const newNote = {
                    id: `note_${Date.now()}`,
                    name: name.trim(),
                    x,
                    y,
                    content: content.trim() || '无备注'
                };
                state.notes.push(newNote);
                // 更新列表和渲染
                updateNoteList();
                renderMap();
            }
        }

        /**
         * 5. 手动添加坐标点（通过输入坐标）

        function addManualNote() {

        }

        /**
         * 7. 保存当前地图（新建文件）
         */
        function saveCurrentMap() {
            const currentMapName = document.getElementById('currentMapName').value.trim() || '未命名地图';
            
            const mapData = {
                mapName: currentMapName,

        function fallbackDownload(data, fileName) {
            const jsonStr = JSON.stringify(data, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        /**
         * 13. JSON读取地图
         */
        function loadMap(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    autoSaveCurrentMap(); // 读取文件前自动保存当前地图
                    const jsonData = JSON.parse(event.target.result);
                    // 校验核心字段
                    const requiredFields = ['scale', 'unit', 'notes', 'rangeMarkers', 'mapRelations'];
                    const missingFields = requiredFields.filter(field => !jsonData.hasOwnProperty(field));
                    if (missingFields.length > 0) {
                        throw new Error(`JSON文件缺失核心字段：${missingFields.join(',')}`);
                    }
                    
                    // 保存到已保存地图列表
                    const mapName = jsonData.mapName || '未命名地图';
                    state.savedMaps[mapName] = jsonData;
                    
                    // 更新全局状态
                    state.scale = Math.max(0.1, Math.min(2, jsonData.scale));
                    state.mapSize = jsonData.mapSize || 2000;
                    state.offsetX = 0;
                    state.offsetY = 0;
                    state.notes = jsonData.notes || [];
                    state.rangeMarkers = jsonData.rangeMarkers || [];
                    state.geoMarkers = migrateGeoData(jsonData);
                    state.mapRelations = jsonData.mapRelations || [];
                    state.unit = jsonData.unit || { name: '里', desc: '1里=500米' };
                    
                    // 更新页面显示
                    document.getElementById('currentMapName').value = mapName;
                    document.getElementById('unitName').value = state.unit.name;
                    document.getElementById('unitDesc').value = state.unit.desc;
                    unitDescDisplay.textContent = state.unit.desc;
                    
                    updateAllLists();
                    updateSavedMapsList();
                    renderMap();
                    
                    alert(`已读取并保存【${mapName}】地图数据！`);
                } catch (error) {
                    alert(`地图读取失败：${error.message}`);
                }
            };
            reader.readAsText(file);
        }

        /**
         * 14. 批量导入地图（可选）
         */
        function batchLoadMaps(e) {
            const files = e.target.files;
            if (files.length === 0) return;
            state.mapList = [];
            state.currentMapIndex = -1;
            
            let loadedCount = 0;
            
            // 读取所有选中的JSON文件
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        const jsonData = JSON.parse(event.target.result);
                        // 校验核心字段
                        const requiredFields = ['scale', 'unit', 'notes', 'rangeMarkers', 'mapRelations'];
                        const missingFields = requiredFields.filter(field => !jsonData.hasOwnProperty(field));
                        if (missingFields.length > 0) throw new Error(`缺失字段：${missingFields.join(',')}`);
                        
                        const mapName = jsonData.mapName || file.name.replace('.json', '');
                        
                        // 添加到地图列表
                        state.mapList.push({
                            fileName: file.name,
                            mapName: mapName,
                            data: jsonData
                        });
                        
                        // 保存到已保存地图列表
                        state.savedMaps[mapName] = jsonData;
                        
                        loadedCount++;
                        
                        // 更新地图列表显示
                        updateMapList();
                        updateSavedMapsList();
                        
                        if (loadedCount === files.length) {
                            alert(`成功导入${loadedCount}个地图文件！`);
                        }
                    } catch (error) {
                        alert(`文件${file.name}解析失败：${error.message}`);
                    }
                };
                reader.readAsText(file);
            });
        }

        /**

         */
        function autoSaveCurrentMap() {
            const currentMapName = document.getElementById('currentMapName').value.trim();
            if (!currentMapName) return;
            const hasContent = state.notes.length > 0 || state.rangeMarkers.length > 0 || state.mapRelations.length > 0;

            state.savedMaps[currentMapName] = {
                mapName: currentMapName,
                scale: state.scale,
                mapSize: state.mapSize,
                unit: { ...state.unit },
                notes: state.notes.map(n => ({...n})),
                rangeMarkers: state.rangeMarkers.map(m => ({...m, params: {...m.params}})),
                geoMarkers: state.geoMarkers.map(g => ({...g, style: {...g.style}})),
                mapRelations: state.mapRelations.map(r => ({...r})),
                lastSaved: new Date().toLocaleString()
            };
            updateSavedMapsList();
        }

        /**
         * 18. 范围标识：切换参数表单（矩形/圆形）
         */
        function toggleMarkerParams() {
            const type = document.getElementById('markerType').value;
            document.getElementById('rectParams').style.display = type === 'rect' ? 'block' : 'none';
            document.getElementById('circleParams').style.display = type === 'circle' ? 'block' : 'none';

        /**
         * 18. 范围标识：添加标识（带名称）
         */
        function addRangeMarker() {
            const name = markerName.value.trim();
            if (!name) {
                alert('标识名称不能为空！');
                return;
            }
            
            const type = document.getElementById('markerType').value;
            let params = {};
            let isValid = true;

            try {
                if (type === 'rect') {
                    // 读取矩形参数并验证
                    const x1 = parseInt(document.getElementById('rectX1').value);
                    const y1 = parseInt(document.getElementById('rectY1').value);
                    const x2 = parseInt(document.getElementById('rectX2').value);
                    const y2 = parseInt(document.getElementById('rectY2').value);
                    const x3 = parseInt(document.getElementById('rectX3').value);
                    const y3 = parseInt(document.getElementById('rectY3').value);
                    const x4 = parseInt(document.getElementById('rectX4').value);
                    const y4 = parseInt(document.getElementById('rectY4').value);
                    // 验证坐标范围（0~2000）
                    const coords = [x1, y1, x2, y2, x3, y3, x4, y4];
                    if (coords.some(c => isNaN(c) || c < 0 || c > 2000)) {
                        isValid = false;
                        throw new Error('矩形坐标必须是0~2000的整数');
                    }
                    params = { x1, y1, x2, y2, x3, y3, x4, y4 };
                } else if (type === 'circle') {
                    // 读取圆形参数并验证
                    const cx = parseInt(document.getElementById('circleCx').value);
                    const cy = parseInt(document.getElementById('circleCy').value);
                    const r = parseInt(document.getElementById('circleR').value);
                    // 验证坐标（0~2000）和半径（0~1000）
                    if (isNaN(cx) || cx < 0 || cx > 2000 || isNaN(cy) || cy < 0 || cy > 2000) {
                        isValid = false;
                        throw new Error('圆心坐标必须是0~2000的整数');
                    }
                    if (isNaN(r) || r < 0 || r > 1000) {
                        isValid = false;
                        throw new Error('半径必须是0~1000的整数');
                    }
                    params = { cx, cy, r };
                }

                if (isValid) {
                    // 添加新标识
                    const newMarker = {
                        id: `marker_${Date.now()}`,
                        name,
                        type,
                        params
                    };
                    state.rangeMarkers.push(newMarker);
                    // 更新列表和渲染
                    updateMarkerList();
                    renderMap();
                }
            } catch (error) {
                alert(`添加标识失败：${error.message}`);
            }
        }

        /**
         * 19. 范围标识：编辑标识（带名称）
         */
        function editMarker(markerId) {
            const marker = state.rangeMarkers.find(m => m.id === markerId);
            if (!marker) return;

            // 填充表单
            markerName.value = marker.name;
            document.getElementById('markerType').value = marker.type;
            toggleMarkerParams(); // 切换表单显示
            if (marker.type === 'rect') {
                const { x1, y1, x2, y2, x3, y3, x4, y4 } = marker.params;
                document.getElementById('rectX1').value = x1;
                document.getElementById('rectY1').value = y1;
                document.getElementById('rectX2').value = x2;
                document.getElementById('rectY2').value = y2;
                document.getElementById('rectX3').value = x3;
                document.getElementById('rectY3').value = y3;
                document.getElementById('rectX4').value = x4;
                document.getElementById('rectY4').value = y4;
            } else if (marker.type === 'circle') {
                const { cx, cy, r } = marker.params;
                document.getElementById('circleCx').value = cx;
                document.getElementById('circleCy').value = cy;
                document.getElementById('circleR').value = r;
            }

            // 删除原标识（后续重新添加）
            state.rangeMarkers = state.rangeMarkers.filter(m => m.id !== markerId);
            updateMarkerList();
        }

        /**
         * 20. 范围标识：删除标识
         */
        function deleteMarker(markerId) {
            state.rangeMarkers = state.rangeMarkers.filter(m => m.id !== markerId);
            updateMarkerList();
            renderMap();
        }

        /**
         * 21. 量化单位：保存设置
         */
        function saveUnitSetting() {
            const name = document.getElementById('unitName').value.trim();
            const desc = document.getElementById('unitDesc').value.trim();
            if (!name || !desc) {
                alert('单位名称和说明不能为空！');
                return;
            }
            // 更新状态和显示
            state.unit = { name, desc };
            unitDescDisplay.textContent = desc;
            alert('单位设置保存成功！');
        }

        /**
         * 22. 地图关联：添加双向关联（完整实现）
         */
        function addMapRelation() {
            const currentMapName = document.getElementById('currentMapName').value.trim();
            const targetMapName = document.getElementById('targetMapName').value.trim();
            const currentMapXY = document.getElementById('currentMapXY').value.trim();
            const targetMapXY = document.getElementById('targetMapXY').value.trim();

            // 验证输入
            if (!currentMapName || !targetMapName || !currentMapXY || !targetMapXY) {
                alert('所有字段不能为空！');
                return;
            }
            
            // 检查目标地图是否存在（已保存的地图中）
            const targetMapExists = state.savedMaps.hasOwnProperty(targetMapName);
            
            if (!targetMapExists) {
                alert(`错误：未找到【${targetMapName}】地图，请先保存该地图！`);
                return;
            }

            // 验证坐标格式（x,y）
            const xyRegex = /^\d{1,4},\d{1,4}$/;
            if (!xyRegex.test(currentMapXY) || !xyRegex.test(targetMapXY)) {
                alert('坐标格式错误，应为"x,y"（0~2000）');
                return;
            }
            
            // 验证坐标范围
            const [cx, cy] = currentMapXY.split(',').map(Number);
            const [tx, ty] = targetMapXY.split(',').map(Number);
            
            if (cx < 0 || cx > 2000 || cy < 0 || cy > 2000 || tx < 0 || tx > 2000 || ty < 0 || ty > 2000) {
                alert('坐标值必须在0~2000之间！');
                return;
            }

            // 检查当前坐标是否已有关联（同一坐标只能关联一个目标地图）
            const existingRelation = state.mapRelations.find(r => r.currentXY === currentMapXY);
            if (existingRelation) {
                alert(`坐标 (${currentMapXY}) 已关联地图「${existingRelation.targetMapName}」，不可重复关联！\n如需更换关联，请先删除原有关联。`);
                return;
            }

            // 添加当前地图的关联
            const newRelation = {
                id: `relation_${Date.now()}`,
                currentMapName,
                currentXY: currentMapXY,
                targetMapName,
                targetXY: targetMapXY
            };
            state.mapRelations.push(newRelation);

            // 自关联：直接在 state.mapRelations 中添加反向关联，跳过文件写入（正反向随当前地图一起保存）
            if (currentMapName === targetMapName) {
                const reverseRelation = {
                    id: `relation_${Date.now()}_reverse`,
                    currentMapName: targetMapName,
                    currentXY: targetMapXY,
                    targetMapName: currentMapName,
                    targetXY: currentMapXY
                };
                state.mapRelations.push(reverseRelation);
            }
            // 跨地图关联：在目标地图中添加反向关联
            else if (state.savedMaps[targetMapName]) {
                const reverseRelation = {
                    id: `relation_${Date.now()}_reverse`,
                    currentMapName: targetMapName,
                    currentXY: targetMapXY,
                    targetMapName: currentMapName,
                    targetXY: currentMapXY
                };
                
                // 更新已保存的目标地图数据
                state.savedMaps[targetMapName].mapRelations = state.savedMaps[targetMapName].mapRelations || [];
                state.savedMaps[targetMapName].mapRelations.push(reverseRelation);
                
                // 如果目标地图已加载到当前显示，则直接添加
                if (document.getElementById('currentMapName').value === targetMapName) {
                    state.mapRelations.push(reverseRelation);
                }

                // 同时写入目标地图的 JSON 文件
                if (state.workDirHandle) {
                    saveToDir(state.savedMaps[targetMapName], `${targetMapName}.json`);
                }
            }

            // 更新列表和渲染
            updateRelationList();
            renderMap();
            
            alert(`双向关联添加成功！已在【${currentMapName}】和【${targetMapName}】中创建关联标识。`);
        }

        /**
         * 23. 地图关联：删除关联
         */
        function deleteRelation(relationId) {
            // 删除当前地图中的关联
            const deletedRelation = state.mapRelations.find(r => r.id === relationId);
            state.mapRelations = state.mapRelations.filter(r => r.id !== relationId);
            
            // 如果有反向关联，也一并删除并写入目标地图 JSON
            if (deletedRelation && state.savedMaps[deletedRelation.targetMapName]) {
                const targetRelations = state.savedMaps[deletedRelation.targetMapName].mapRelations || [];
                state.savedMaps[deletedRelation.targetMapName].mapRelations = targetRelations.filter(
                    r => !(r.targetMapName === deletedRelation.currentMapName && r.targetXY === deletedRelation.currentXY)
                );
                if (state.workDirHandle) {
                    saveToDir(state.savedMaps[deletedRelation.targetMapName], `${deletedRelation.targetMapName}.json`);
                }
            }
            
            updateRelationList();
            renderMap();
        }

        /**
         * 24. 坐标点：查看坐标点详情
         */
        function showNoteBox(noteId) {
            const note = state.notes.find(n => n.id === noteId);
            if (!note) return;
            
            state.currentNoteId = noteId;
            state.isEditingNote = false;
            
            // 填充坐标点信息
            noteNameDisplay.textContent = note.name;
            noteContentDisplay.textContent = note.content;
            noteContentTextarea.value = note.content;
            state.originalNoteContent = note.content;
            
            // 计算备注框在页面上的位置（基于Canvas坐标和缩放偏移）
            const rect = canvas.getBoundingClientRect();
            const displayX = (note.x - state.offsetX) * state.scale + rect.left + canvas.width / 2 - state.mapSize * state.scale / 2;
            const displayY = (note.y - state.offsetY) * state.scale + rect.top + canvas.height / 2 - state.mapSize * state.scale / 2;
            
            // 设置备注框位置（避免超出可视区域）
            noteBox.style.left = `${Math.min(displayX + 20, rect.right - 270)}px`;
            noteBox.style.top = `${Math.min(displayY + 20, rect.bottom - 150)}px`;
            
            // 切换到查看模式
            toggleNoteEditMode(false);
            
            // 显示备注框
            noteBox.style.display = 'block';
        }

        /**
         * 25. 坐标点：开始编辑备注
         */
        function startEditNote() {
            if (!state.currentNoteId) return;
            
            state.isEditingNote = true;
            toggleNoteEditMode(true);
        }

        /**
         * 26. 坐标点：保存编辑的备注
         */
        function saveEditNote() {
            if (!state.currentNoteId) return;
            
            const note = state.notes.find(n => n.id === state.currentNoteId);
            if (!note) return;
            
            const newContent = noteContentTextarea.value.trim();
            if (newContent.length > 200) {
                alert('备注字数不能超过200字！');
                return;
            }
            
            note.content = newContent || '无备注';
            noteContentDisplay.textContent = note.content;
            
            state.isEditingNote = false;
            toggleNoteEditMode(false);
            
            // 更新列表和渲染
            updateNoteList();
            renderMap();
        }

        /**
         * 27. 坐标点：取消编辑备注
         */
        function cancelEditNote() {
            noteContentTextarea.value = state.originalNoteContent;
            state.isEditingNote = false;
            toggleNoteEditMode(false);
        }

        /**
         * 28. 坐标点：删除坐标点
         */
        function deleteNote(noteId) {
            if (!noteId) return;
            
            if (confirm('确定要删除此坐标点吗？')) {
                state.notes = state.notes.filter(n => n.id !== noteId);
                noteBox.style.display = 'none';
                state.currentNoteId = null;
                state.isEditingNote = false;
                updateNoteList();
                renderMap();
            }
        }

        /**
         * 切换备注编辑/查看模式
         */
        function toggleNoteEditMode(isEditing) {
            noteContentDisplay.style.display = isEditing ? 'none' : 'block';
            noteContentEdit.style.display = isEditing ? 'block' : 'none';
            editNoteBtn.style.display = isEditing ? 'none' : 'block';
            saveNoteBtn.style.display = isEditing ? 'block' : 'none';
            cancelNoteBtn.style.display = isEditing ? 'block' : 'none';
        } 
                // ==================== 列表更新函数 ====================
        /**
         * 更新坐标点列表
         */
        function updateNoteList() {
            const noteListEl = document.getElementById('noteList');
            if (state.notes.length === 0) {
                noteListEl.innerHTML = '暂无坐标点，点击地图或上方添加';
                return;
            }
            noteListEl.innerHTML = '';
            state.notes.forEach(note => {
                const item = document.createElement('div');
                item.className = 'list-item';
                
                const contentText = note.content.length > 20 ? note.content.slice(0,20)+'...' : note.content;
                item.innerHTML = `
                    <div style="flex:1;">
                        <div style="font-weight:600; color:#e74c3c;">${note.name}</div>
                        <div style="font-size:12px; color:#666;">(${note.x},${note.y})：${contentText}</div>
                    </div>
                    <div>
                        <button class="list-btn" onclick="showNoteBox('${note.id}')">查看</button>
                        <button class="list-btn btn-danger" onclick="deleteNote('${note.id}')">删除</button>
                    </div>
                `;
                noteListEl.appendChild(item);
            });
        }

        /**
         * 更新范围标识列表（显示名称）
         */
        function updateMarkerList() {
            const markerListEl = document.getElementById('markerList');
            if (state.rangeMarkers.length === 0) {
                markerListEl.innerHTML = '暂无标识';
                return;
            }
            markerListEl.innerHTML = '';
            state.rangeMarkers.forEach(marker => {
                const item = document.createElement('div');
                item.className = 'list-item';
                let paramsText = '';
                if (marker.type === 'rect') {
                    const { x1, y1, x3, y3 } = marker.params;
                    paramsText = `矩形 (${x1},${y1})~(${x3},${y3})`;
                } else if (marker.type === 'circle') {
                    const { cx, cy, r } = marker.params;
                    paramsText = `圆形 (${cx},${cy}) r=${r}`;
                }
                item.innerHTML = `
                    <div style="flex:1;">
                        <div style="font-weight:600;">${marker.name}</div>
                                                <div style="font-size:12px; color:#666;">${paramsText}</div>
                    </div>
                    <div>
                        <button class="list-btn" onclick="editMarker('${marker.id}')">编辑</button>
                        <button class="list-btn btn-danger" onclick="deleteMarker('${marker.id}')">删除</button>
                    </div>
                `;
                markerListEl.appendChild(item);
            });
        }

        /**
         * 更新地图关联列表
         */
        function updateRelationList() {
            const relationListEl = document.getElementById('relationList');
            if (state.mapRelations.length === 0) {
                relationListEl.innerHTML = '暂无关联';
                return;
            }
            relationListEl.innerHTML = '';
            state.mapRelations.forEach(relation => {
                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerHTML = `
                    <span>${relation.currentMapName}(${relation.currentXY}) ↔ ${relation.targetMapName}(${relation.targetXY})</span>
                    <button class="list-btn btn-danger" onclick="deleteRelation('${relation.id}')">删除</button>
                `;
                relationListEl.appendChild(item);
            });
        }

        /**
         * 更新地图列表（批量导入）- 带选中样式
         */
        function updateMapList() {
            if (state.mapList.length === 0) {
                mapList.style.display = 'none';
                return;
            }
            mapList.style.display = 'block';
            mapListContent.innerHTML = '';
            state.mapList.forEach((map, index) => {
                const item = document.createElement('div');
                item.className = `map-list-item ${index === state.currentMapIndex ? 'active' : ''}`;
                item.textContent = map.mapName;
                item.addEventListener('click', () => switchMap(index));
                mapListContent.appendChild(item);
            });
        }

        /**
         * 批量更新所有列表
         */
        function updateAllLists() {
            updateNoteList();
            updateMarkerList();
            updateGeoList();
            updateRelationList();
            updateMapList();
        }

        // ==================== 全局函数暴露（供HTML调用） ====================
        window.showNoteBox = showNoteBox;
        window.editNote = startEditNote;
        window.deleteNote = deleteNote;
        window.editMarker = editMarker;
        window.deleteMarker = deleteMarker;
        window.editGeoMarker = editGeoMarker;
        window.deleteGeoMarker = deleteGeoMarker;
        window.deleteRelation = deleteRelation;
        window.loadSavedMap = loadSavedMap;
        window.deleteSavedMap = deleteSavedMap;
        window.switchMap = switchMap;

        // ==================== 启动工具 ====================
        init();
        // v2026-03-25: Added File System Access API support
    </script>
</body>
</html>
